<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>长街宴礼仪流程·时空双轴图</title>
  <style>
    :root {
      --ink: #3d2b1f;
      --muted: #6b5344;
      --red: #8b1a1a;
      --red-bright: #b83228;
      --gold: #d4a843;
      --gold-light: #e8c96a;
      --jade: #2f5a4a;
      --jade-bright: #3f7a64;
      --cream: #fff8ef;
      --paper: #f5efe6;
    }

    html, body { background-color: #f5efe6 !important; height: auto !important; min-height: 0 !important; }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      padding: 16px 12px 24px;
      background: transparent;
      color: var(--ink);
      font-family: 'Noto Serif SC', 'Songti SC', 'SimSun', serif;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    .stage {
      max-width: 980px;
      margin: 0 auto;
      display: grid;
      gap: 20px;
    }

    .card {
      position: relative;
      padding: 22px 20px 24px;
      border-radius: 4px;
      background:
        radial-gradient(ellipse 90% 70% at 8% 0%, rgba(212, 168, 67, 0.2), transparent 50%),
        radial-gradient(ellipse 70% 60% at 100% 100%, rgba(47, 90, 74, 0.14), transparent 48%),
        radial-gradient(ellipse 50% 40% at 50% 50%, rgba(139, 26, 26, 0.06), transparent 60%),
        linear-gradient(168deg, #fffaf2 0%, #f3e8d6 48%, #ebe0ce 100%);
      border: 1.5px solid rgba(139, 26, 26, 0.18);
      box-shadow:
        0 1px 0 rgba(255, 255, 255, 0.65) inset,
        0 18px 48px rgba(61, 43, 31, 0.1);
      overflow: hidden;
    }

    .card::before,
    .card::after {
      content: '';
      position: absolute;
      width: 48px;
      height: 48px;
      pointer-events: none;
      opacity: 0.55;
      background:
        linear-gradient(var(--red), var(--red)) top left / 18px 2px no-repeat,
        linear-gradient(var(--red), var(--red)) top left / 2px 18px no-repeat,
        linear-gradient(var(--gold), var(--gold)) top left / 10px 10px no-repeat;
    }
    .card::before { top: 10px; left: 10px; }
    .card::after {
      right: 10px; bottom: 10px;
      transform: rotate(180deg);
    }

    .corner-tr, .corner-bl {
      position: absolute;
      width: 48px;
      height: 48px;
      opacity: 0.55;
      pointer-events: none;
      background:
        linear-gradient(var(--jade), var(--jade)) top right / 18px 2px no-repeat,
        linear-gradient(var(--jade), var(--jade)) top right / 2px 18px no-repeat,
        linear-gradient(var(--gold), var(--gold)) top right / 10px 10px no-repeat;
    }
    .corner-tr { top: 10px; right: 10px; }
    .corner-bl { left: 10px; bottom: 10px; transform: rotate(180deg); }

    .card-ornament {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        repeating-linear-gradient(
          90deg,
          transparent 0 36px,
          rgba(139, 26, 26, 0.03) 36px 37px
        );
      mask-image: linear-gradient(180deg, transparent, #000 18%, #000 82%, transparent);
    }

    .head {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin-bottom: 18px;
    }

    .head__line {
      flex: 1;
      height: 1px;
      max-width: 120px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    .head__badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 18px;
      border-radius: 999px;
      color: #fffaf2;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.18em;
      background:
        linear-gradient(120deg, #6e1212 0%, #8b1a1a 35%, #b83228 70%, #d4a843 100%);
      box-shadow:
        0 0 0 1px rgba(232, 201, 106, 0.35),
        0 8px 22px rgba(139, 26, 26, 0.35);
    }

    .head__badge svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    /* ===== 空间轴 ===== */
    .banquet {
      position: relative;
      padding: 8px 4px 4px;
    }

    .banquet-svg {
      width: 100%;
      height: auto;
      display: block;
      overflow: visible;
    }

    .zone {
      cursor: pointer;
    }
    .zone .zone-overlay {
      fill: transparent;
      stroke: transparent;
      stroke-width: 2;
      transition: fill 0.35s ease, stroke 0.35s ease, opacity 0.35s ease;
    }
    .zone.is-dim .zone-overlay {
      fill: rgba(245, 239, 230, 0.52);
      opacity: 1;
    }
    .zone.is-active .zone-overlay {
      fill: rgba(255, 215, 0, 0.16);
      stroke: rgba(212, 168, 67, 0.85);
      opacity: 1;
    }

    .zone-label {
      font-family: 'Noto Serif SC', serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      pointer-events: none;
    }

    .legend-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px 18px;
      margin-top: 14px;
      position: relative;
      z-index: 1;
    }

    .legend-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 12px;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.55);
      border: 1px solid rgba(139, 26, 26, 0.1);
    }

    .legend-pill b {
      width: 12px;
      height: 12px;
      border-radius: 3px;
      display: inline-block;
      box-shadow: 0 0 0 2px rgba(255,255,255,0.6);
    }

    /* ===== 时间轴 ===== */
    .timeline {
      position: relative;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px;
      padding-top: 8px;
    }

    .rail {
      position: absolute;
      top: 58px;
      left: 7%;
      right: 7%;
      height: 6px;
      border-radius: 999px;
      background: linear-gradient(90deg,
        rgba(139, 26, 26, 0.12),
        rgba(212, 168, 67, 0.18),
        rgba(47, 90, 74, 0.14));
      z-index: 0;
      overflow: hidden;
    }

    .rail__fill {
      height: 100%;
      width: 0;
      border-radius: inherit;
      background: linear-gradient(90deg, #8b1a1a, #d4a843, #2f5a4a);
      box-shadow: 0 0 16px rgba(212, 168, 67, 0.65);
      transition: width 0.8s cubic-bezier(0.22, 1, 0.36, 1);
      position: relative;
    }

    .rail__fill::after {
      content: '';
      position: absolute;
      right: -2px;
      top: 50%;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      transform: translateY(-50%);
      background: radial-gradient(circle at 35% 35%, #fff, var(--gold-light) 45%, var(--red));
      box-shadow: 0 0 12px rgba(212, 168, 67, 0.8);
    }

    .step {
      position: relative;
      z-index: 2;
      border: none;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.78), rgba(255,248,239,0.42));
      padding: 16px 10px 18px;
      border-radius: 18px;
      cursor: pointer;
      text-align: center;
      font-family: inherit;
      color: inherit;
      border: 1px solid rgba(139, 26, 26, 0.1);
      box-shadow: 0 4px 14px rgba(61, 43, 31, 0.05);
      transition: transform 0.4s cubic-bezier(0.22,1,0.36,1), box-shadow 0.4s, border-color 0.4s, background 0.4s;
    }

    .step:hover { transform: translateY(-4px); border-color: rgba(212, 168, 67, 0.4); }

    .step__num {
      width: 28px;
      height: 28px;
      margin: 0 auto 10px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      background: #fff;
      border: 1.5px solid rgba(139, 26, 26, 0.18);
      transition: 0.35s ease;
    }

    .step__icon-wrap {
      width: 64px;
      height: 64px;
      margin: 0 auto 12px;
      border-radius: 20px;
      display: grid;
      place-items: center;
      position: relative;
      background: linear-gradient(145deg, #fff, #f0e2cc);
      border: 1.5px solid rgba(212, 168, 67, 0.35);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.9),
        0 8px 18px rgba(61, 43, 31, 0.08);
      transition: 0.4s ease;
    }

    
    .step__photo {
      width: 68px;
      height: 68px;
      margin: 0 auto 12px;
      border-radius: 50%;
      overflow: hidden;
      border: 2.5px solid rgba(212, 168, 67, 0.55);
      box-shadow:
        0 0 0 3px rgba(255,255,255,0.65),
        0 8px 18px rgba(61, 43, 31, 0.14);
      background: #3d2b1f center/cover no-repeat;
      transition: 0.4s ease;
    }
    .step.is-active .step__photo {
      transform: scale(1.1);
      border-color: #d4a843;
      animation: iconAura 1.8s ease-in-out infinite;
    }

    .step__icon-wrap svg {
      width: 34px;
      height: 34px;
    }

    .step__title {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
      color: var(--ink);
    }

    .step__desc {
      font-size: 11px;
      line-height: 1.55;
      color: var(--muted);
      min-height: 3.2em;
    }

    .step.is-active {
      transform: translateY(-8px);
      background: linear-gradient(180deg, #fffaf3, #f8e6c8);
      border-color: rgba(139, 26, 26, 0.28);
      box-shadow:
        0 16px 36px rgba(139, 26, 26, 0.16),
        0 0 0 1px rgba(212, 168, 67, 0.25);
    }

    .step.is-active .step__num {
      color: #fff;
      background: linear-gradient(135deg, #8b1a1a, #d4a843);
      border-color: transparent;
      transform: scale(1.08);
    }

    .step.is-active .step__icon-wrap {
      transform: scale(1.08);
      animation: iconAura 1.8s ease-in-out infinite;
    }

    .step.is-active .step__title { color: var(--red); }

    .step[data-tone="gold"] .step__icon-wrap { background: linear-gradient(145deg, #fff3d4, #e8c96a); }
    .step[data-tone="red"] .step__icon-wrap { background: linear-gradient(145deg, #ffd8d0, #d46a5a); }
    .step[data-tone="blue"] .step__icon-wrap { background: linear-gradient(145deg, #dce8ff, #7a98c8); }
    .step[data-tone="jade"] .step__icon-wrap { background: linear-gradient(145deg, #d5f0e4, #5aa888); }
    .step[data-tone="plum"] .step__icon-wrap { background: linear-gradient(145deg, #f5dceb, #c48ab0); }

    @keyframes iconAura {
      0%, 100% { box-shadow: 0 0 0 0 rgba(212, 168, 67, 0.45), 0 8px 18px rgba(61,43,31,0.08); }
      50% { box-shadow: 0 0 0 12px rgba(212, 168, 67, 0), 0 12px 24px rgba(139,26,26,0.15); }
    }

    .tooltip {
      position: fixed;
      z-index: 99;
      max-width: 260px;
      padding: 14px 16px;
      background: linear-gradient(160deg, #fffaf3, #f3e2c8);
      border-radius: 14px;
      border: 1px solid rgba(139, 26, 26, 0.2);
      box-shadow: 0 16px 40px rgba(61, 43, 31, 0.18);
      font-size: 13px;
      line-height: 1.55;
      pointer-events: none;
      opacity: 0;
      transform: translateY(8px) scale(0.96);
      transition: 0.25s ease;
    }
    .tooltip.is-visible { opacity: 1; transform: none; }
    .tooltip strong {
      display: block;
      margin-bottom: 4px;
      color: var(--red);
      letter-spacing: 0.06em;
    }

    @media (max-width: 720px) {
      .timeline { grid-template-columns: 1fr; gap: 12px; }
      .rail { display: none; }
      .step {
        display: grid;
        grid-template-columns: 64px 1fr;
        gap: 6px 14px;
        text-align: left;
        align-items: center;
      }
      .step__num { grid-row: 1 / span 2; margin: 0; align-self: start; }
      .step__icon-wrap { grid-column: 1; grid-row: 1 / span 2; margin: 0; width: 56px; height: 56px; }
      .step__num { display: none; }
    }
  </style>
</head>
<body>
<div id="embed-fit">
  <div class="stage">
    <!-- 空间轴 -->
    <section class="card" aria-label="空间轴·席位分区">
      <span class="corner-tr"></span>
      <span class="corner-bl"></span>
      <div class="card-ornament"></div>
      <div class="head">
        <span class="head__line"></span>
        <span class="head__badge">
          <svg viewBox="0 0 24 24" fill="none"><path d="M4 12h16M12 4v16" stroke="#e8c96a" stroke-width="2"/><circle cx="12" cy="12" r="3" fill="#e8c96a"/></svg>
          空间轴 · 席位分区
        </span>
        <span class="head__line"></span>
      </div>

      <div class="banquet">
        <svg class="banquet-svg" viewBox="0 0 606 108" role="img" aria-label="长街宴龙舟席位示意" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
          <image href="image/礼仪/dragon-boat-banquet.png" xlink:href="image/礼仪/dragon-boat-banquet.png" x="0" y="0" width="606" height="84" preserveAspectRatio="xMidYMid meet"/>

          <g class="zone" data-zone="red" data-tip="龙头主桌（红）|长辈居首，桌首设龙首木雕，象征尊长与福源">
            <rect class="zone-overlay" x="92" y="16" width="132" height="58" rx="4"/>
            <text class="zone-label" x="158" y="100" text-anchor="middle" fill="#8b1a1a">龙头主桌</text>
          </g>
          <g class="zone" data-zone="gold" data-tip="宾客席（金）|中青年宾客就座，宴席主体与交流核心">
            <rect class="zone-overlay" x="224" y="16" width="168" height="58" rx="4"/>
            <text class="zone-label" x="308" y="100" text-anchor="middle" fill="#8b5a1e">宾客席</text>
          </g>
          <g class="zone" data-zone="jade" data-tip="晚辈席（青）|孩童与晚辈就座，承接福气与传承">
            <rect class="zone-overlay" x="392" y="16" width="210" height="58" rx="4"/>
            <text class="zone-label" x="497" y="100" text-anchor="middle" fill="#1f4638">晚辈席</text>
          </g>
        </svg>
      </div>

      <div class="legend-row">
        <span class="legend-pill"><b style="background:linear-gradient(135deg,#d45a48,#6e1212)"></b>龙头主桌 · 长辈</span>
        <span class="legend-pill"><b style="background:linear-gradient(135deg,#f0d78a,#b8862a)"></b>宾客席 · 中青年</span>
        <span class="legend-pill"><b style="background:linear-gradient(135deg,#6fbf9a,#1f4638)"></b>晚辈席 · 孩童</span>
      </div>
    </section>

    <!-- 时间轴 -->
    <section class="card" aria-label="时间轴·礼仪五环节">
      <span class="corner-tr"></span>
      <span class="corner-bl"></span>
      <div class="card-ornament"></div>
      <div class="head">
        <span class="head__line"></span>
        <span class="head__badge">
          <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="8" stroke="#e8c96a" stroke-width="2"/><path d="M12 8v5l3 2" stroke="#e8c96a" stroke-width="2" stroke-linecap="round"/></svg>
          时间轴 · 礼仪五环节
        </span>
        <span class="head__line"></span>
      </div>

      <div class="timeline" id="timeline">
        <div class="rail"><div class="rail__fill" id="rail-fill"></div></div>
      </div>
    </section>
  </div>

  <div class="tooltip" id="tooltip" role="tooltip" hidden></div>

  <script>
    var STEPS = [
      { title: '迎宾礼', photo: 'image/礼仪/welcome.jpg', tone: 'gold', desc: '主人列队迎候；拦门酒；赠七彩糯米饭' },
      { title: '分福肉', photo: 'image/礼仪/meat.png', tone: 'red', desc: '选福肉首刀；按长幼分发；寓意分福共享' },
      { title: '敬酒礼', photo: 'image/礼仪/wine.jpg', tone: 'blue', desc: '先敬长辈；双手持杯；以焖锅酒表敬意' },
      { title: '布菜礼', photo: 'image/礼仪/fish.jpg', tone: 'jade', desc: '依序上菜；特色菜逐道呈献；寓意吉祥' },
      { title: '散席礼', photo: 'image/礼仪/farewell.jpg', tone: 'plum', desc: '主人送客；互道珍重；赠伴手礼' }
    ];

    var timeline = document.getElementById('timeline');
    var railFill = document.getElementById('rail-fill');
    var tooltip = document.getElementById('tooltip');
    var activeStep = 0;
    var autoTimer;

    STEPS.forEach(function (step, index) {
      var btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'step' + (index === 0 ? ' is-active' : '');
      btn.dataset.index = index;
      btn.dataset.tone = step.tone;
      btn.innerHTML =
        '<div class="step__num">' + (index + 1) + '</div>' +
        '<div class="step__photo" style="background-image:url(\'' + step.photo + '\')"></div>' +
        '<div class="step__title">' + step.title + '</div>' +
        '<div class="step__desc">' + step.desc + '</div>';
      btn.addEventListener('click', function () { setStep(index, true); });
      timeline.appendChild(btn);
    });

    function setStep(index, pauseAuto) {
      activeStep = index;
      timeline.querySelectorAll('.step').forEach(function (el, i) {
        el.classList.toggle('is-active', i === index);
      });
      railFill.style.width = (index / (STEPS.length - 1) * 100) + '%';
      if (pauseAuto) resetAuto();
    }

    function resetAuto() {
      clearInterval(autoTimer);
      autoTimer = setInterval(function () {
        setStep((activeStep + 1) % STEPS.length, false);
      }, 2800);
    }

    function showTip(html, x, y) {
      tooltip.innerHTML = html;
      tooltip.hidden = false;
      tooltip.classList.add('is-visible');
      var rect = tooltip.getBoundingClientRect();
      tooltip.style.left = Math.min(x + 14, window.innerWidth - rect.width - 12) + 'px';
      tooltip.style.top = Math.max(y - rect.height - 14, 8) + 'px';
    }

    function hideTip() {
      tooltip.classList.remove('is-visible');
      tooltip.hidden = true;
    }

    document.querySelectorAll('.zone').forEach(function (zone) {
      zone.addEventListener('mouseenter', function (e) {
        document.querySelectorAll('.zone').forEach(function (z) {
          z.classList.toggle('is-dim', z !== zone);
          z.classList.toggle('is-active', z === zone);
        });
        var parts = (zone.dataset.tip || '').split('|');
        showTip('<strong>' + parts[0] + '</strong>' + (parts[1] || ''), e.clientX, e.clientY);
      });
      zone.addEventListener('mousemove', function (e) {
        if (!tooltip.hidden) showTip(tooltip.innerHTML, e.clientX, e.clientY);
      });
      zone.addEventListener('mouseleave', function () {
        document.querySelectorAll('.zone').forEach(function (z) {
          z.classList.remove('is-dim', 'is-active');
        });
        hideTip();
      });
    });

    setStep(0, false);
    resetAuto();
  </script>
</div>
  <script src="js/embed-child.js"></script>
</body>
</html>
