<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>长街宴食材产业链 - 真实数据版</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
    <style>
        html, body { background-color: #f5efe6 !important; height: auto !important; min-height: 0 !important; }
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            margin: 0;
            padding: 12px 20px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
        }
        #chart-container {
            width: 100%;
            max-width: 1200px;
            height: min(700px, 70vh);
            background: transparent;
            border-radius: 0;
            box-shadow: none;
            padding: 0;
            box-sizing: border-box;
        }
        .data-source {
            margin-top: 20px;
            font-size: 12px;
            color: #7a6a58;
            text-align: center;
            max-width: 800px;
        }
    </style>
</head>
<body>

    <div id="chart-container"></div>

    <div class="data-source">
        <strong>数据来源：</strong>红河州人民政府官网、绿春县人民政府、元阳县政府公开通报（2023-2025）。
        注：图中节点数值为真实统计值，非比例估算。
    </div>

<script>
    // 初始化 ECharts 实例
    var myChart = echarts.init(document.getElementById('chart-container'), null, { renderer: 'canvas' });

    // 图表配置项
    var option = {
        backgroundColor: 'transparent',
        tooltip: {
            trigger: 'item',
            triggerOn: 'mousemove',
            backgroundColor: '#ffffff',
            borderColor: 'transparent',
            borderWidth: 0,
            padding: [12, 16],
            extraCssText: 'box-shadow: 0 10px 28px rgba(60, 50, 40, 0.12); border-radius: 12px;',
            textStyle: { color: '#3d2b1f', fontSize: 14, fontFamily: 'PingFang SC, Microsoft YaHei, sans-serif' }
        },
        series: [
            {
                type: 'sankey',
                layout: 'none',
                emphasis: {
                    focus: 'adjacency'
                },
                data: [
                    // 源头节点
                    { name: '森林采集\n(野生菌/竹笋/蜂蛹)', itemStyle: { color: '#8B4513' } },
                    { name: '梯田自产\n(红米/鱼/鸭/猪)', itemStyle: { color: '#DAA520' } },
                    { name: '市集外购\n(盐/酒曲/调料)', itemStyle: { color: '#A9A9A9' } },
                    
                    // 中间过程节点（真实数据）
                    { name: '生态产出\n(1.5万亩示范田)', itemStyle: { color: '#6B8E23' } },
                    { name: '游客流量\n(10.35万人次)', itemStyle: { color: '#FF6347' } },
                    { name: '物资流通\n(本地集市激活)', itemStyle: { color: '#4682B4' } },
                    
                    // 经济结果节点
                    { name: '产值提升\n(亩产值8000元+)', itemStyle: { color: '#32CD32' } },
                    { name: '旅游消费\n(1.12亿元)', itemStyle: { color: '#FF4500' } },
                    { name: '农户增收\n(10953户/户均2000元+)', itemStyle: { color: '#FFD700' } },
                    
                    // 最终结果
                    { name: '文化传承\n(圣席/信仰)', itemStyle: { color: '#8A2BE2' } },
                    { name: '经济闭环\n(乡村振兴)', itemStyle: { color: '#FF1493' } }
                ],
                links: [
                    // 森林 -> 产出/文化
                    { source: '森林采集\n(野生菌/竹笋/蜂蛹)', target: '生态产出\n(1.5万亩示范田)', value: 3000 },
                    { source: '森林采集\n(野生菌/竹笋/蜂蛹)', target: '文化传承\n(圣席/信仰)', value: 1500 },
                    
                    // 梯田 -> 产出/增收
                    { source: '梯田自产\n(红米/鱼/鸭/猪)', target: '生态产出\n(1.5万亩示范田)', value: 5000 },
                    { source: '梯田自产\n(红米/鱼/鸭/猪)', target: '农户增收\n(10953户/户均2000元+)', value: 4000 },
                    
                    // 市集 -> 流通/文化
                    { source: '市集外购\n(盐/酒曲/调料)', target: '物资流通\n(本地集市激活)', value: 500 },
                    { source: '市集外购\n(盐/酒曲/调料)', target: '文化传承\n(圣席/信仰)', value: 300 },
                    
                    // 产出 -> 产值/旅游
                    { source: '生态产出\n(1.5万亩示范田)', target: '产值提升\n(亩产值8000元+)', value: 6000 },
                    { source: '生态产出\n(1.5万亩示范田)', target: '游客流量\n(10.35万人次)', value: 2000 },
                    
                    // 游客 -> 消费
                    { source: '游客流量\n(10.35万人次)', target: '旅游消费\n(1.12亿元)', value: 11200 },
                    
                    // 流通 -> 增收
                    { source: '物资流通\n(本地集市激活)', target: '农户增收\n(10953户/户均2000元+)', value: 1000 },
                    
                    // 产值/消费/增收 -> 最终闭环
                    { source: '产值提升\n(亩产值8000元+)', target: '经济闭环\n(乡村振兴)', value: 4000 },
                    { source: '旅游消费\n(1.12亿元)', target: '经济闭环\n(乡村振兴)', value: 5000 },
                    { source: '农户增收\n(10953户/户均2000元+)', target: '经济闭环\n(乡村振兴)', value: 3000 },
                    
                    // 文化 -> 闭环
                    { source: '文化传承\n(圣席/信仰)', target: '经济闭环\n(乡村振兴)', value: 2000 }
                ],
                lineStyle: {
                    color: 'gradient',
                    curveness: 0.5,
                    opacity: 0.8
                },
                label: {
                    color: '#333',
                    fontSize: 13,
                    fontWeight: 'bold',
                    formatter: function(params) {
                        // 在标签上显示数值（可选，如果太挤可以关掉）
                        if (params.dataType === 'node') {
                            return params.name;
                        }
                        return '';
                    }
                },
                itemStyle: {
                    borderWidth: 1,
                    borderColor: '#f5efe6'
                },
                labelLayout: {
                    hideOverlap: true
                }
            }
        ]
    };

    // 使用刚指定的配置项和数据显示图表。
    myChart.setOption(option);

    myChart.on('finished', function () {
        window.dispatchEvent(new Event('resize'));
    });

    // 响应窗口大小变化
    window.addEventListener('resize', function() {
        myChart.resize();
    });
</script>
<script src="js/embed-child.js"></script>

</body>
</html>
