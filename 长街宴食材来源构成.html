<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>哈尼族长街宴食材构成 - 高级交互版</title>
    <style>
        html, body { background-color: #f5efe6 !important; }
        :root {
            --mountain-color: #7a8fa6;
            --terrace-color: #a66b5a;
            --market-color: #c4a574;
            --dark-text: #3d2b1f;
            --light-text: #f5efe6;
        }

        body {
            margin: 0;
            padding: 40px 0;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: auto;
            overflow-x: hidden;
        }

        .bg-decoration {
            display: none;
        }

        .container {
            position: relative;
            z-index: 1;
            width: 90%;
            max-width: 900px;
            text-align: center;
        }

        .header {
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5rem;
            color: var(--dark-text);
            margin: 0;
            letter-spacing: 2px;
            text-shadow: none;
        }

        .header p.subtitle {
            color: #7a6a58;
            margin-top: 10px;
            font-size: 1.1rem;
        }

        /* 核心布局：绝对定位模拟拼图 */
        .diagram-container {
            position: relative;
            width: 100%;
            height: 600px;
            margin: 0 auto;
        }

        .card {
            position: absolute;
            border-radius: 20px;
            padding: 25px;
            color: var(--dark-text);
            box-shadow: none;
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            cursor: pointer;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            border: 1px solid rgba(61, 43, 31, 0.08);
        }

        /* 悬浮玻璃态效果 */
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.2) 0%, rgba(255,255,255,0) 50%);
            backdrop-filter: blur(5px);
            z-index: 1;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .card:hover::before {
            opacity: 1;
        }

        .card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 12px 24px rgba(61, 43, 31, 0.1);
        }

        /* 各个区块的位置和大小 */
        .card-mountain {
            top: 0;
            left: 5%;
            width: 90%;
            height: 55%;
            background: linear-gradient(135deg, var(--mountain-color) 0%, #8fa0b0 100%);
            z-index: 10;
            clip-path: polygon(0 0, 100% 0, 95% 100%, 5% 100%);
        }

        .card-terrace {
            bottom: 0;
            left: 5%;
            width: 47%;
            height: 40%;
            background: linear-gradient(135deg, var(--terrace-color) 0%, #8b5a4a 100%);
            z-index: 11;
            clip-path: polygon(0 0, 95% 0, 100% 100%, 5% 100%);
        }

        .card-market {
            bottom: 0;
            right: 5%;
            width: 47%;
            height: 40%;
            background: linear-gradient(135deg, var(--market-color) 0%, #b8956e 100%);
            z-index: 12;
            color: #3d2b1f;
            clip-path: polygon(5% 0, 100% 0, 95% 100%, 0 100%);
        }

        /* 标题样式 */
        .card h2 {
            margin: 0 0 15px 0;
            font-size: 1.8rem;
            font-weight: 600;
            position: relative;
            z-index: 2;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        /* 图标容器 */
        .icon-box {
            font-size: 3rem;
            margin-bottom: 15px;
            filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.1));
            position: relative;
            z-index: 2;
            animation: float 3s ease-in-out infinite;
        }

        .card-terrace .icon-box {
            animation-delay: 0.5s;
        }
        .card-market .icon-box {
            animation-delay: 1s;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        /* 内容列表 */
        .card ul {
            list-style: none;
            padding: 0;
            margin: 0;
            font-size: 1.1rem;
            line-height: 1.8;
            position: relative;
            z-index: 2;
            background: rgba(255,255,255,0.2);
            padding: 10px 20px;
            border-radius: 10px;
            backdrop-filter: blur(2px);
        }

        .card-market ul {
            background: rgba(255,255,255,0.4);
        }

        /* 互动弹窗层 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            max-width: 500px;
            width: 90%;
            text-align: center;
            transform: scale(0.8);
            transition: transform 0.3s;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }

        .modal-overlay.active .modal-content {
            transform: scale(1);
        }

        .modal-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 2rem;
            margin: 0 0 10px 0;
            color: var(--dark-text);
        }

        .modal-desc {
            color: #666;
            line-height: 1.6;
        }

        .close-btn {
            margin-top: 30px;
            padding: 10px 30px;
            background: #333;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.3s;
        }

        .close-btn:hover {
            background: #555;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .diagram-container {
                height: auto;
                min-height: 800px;
            }
            .card-mountain {
                position: relative;
                width: 100%;
                height: 300px;
                clip-path: none;
                margin-bottom: 10px;
            }
            .card-terrace, .card-market {
                position: relative;
                width: 100%;
                height: 200px;
                clip-path: none;
                bottom: auto;
                left: auto;
                right: auto;
                margin-bottom: 10px;
            }
            .card h2 {
                font-size: 1.4rem;
            }
            .card ul {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

    <div class="bg-decoration"></div>

    <div class="container">
        <div class="header">
            <h1>哈尼族长街宴食材来源构成</h1>
            <p class="subtitle">点击卡片探索“森林-梯田-市集”的生态智慧
        </div>

        <div class="diagram-container">
            <!-- 1. 山林采集 -->
            <div class="card card-mountain" onclick="openModal('mountain')">
                <div class="icon-box">🌲</div>
                <h2>山林采集</h2>
                <ul>
                    <li>野生菌</li>
                    <li>蜂蛹</li>
                    <li>竹虫</li>
                    <li>蕨菜</li>
                    <li>江鳅等</li>
                </ul>
            </div>

            <!-- 2. 梯田自产 -->
            <div class="card card-terrace" onclick="openModal('terrace')">
                <div class="icon-box">🌾</div>
                <h2>梯田自产</h2>
                <ul>
                    <li>红米</li>
                    <li>梯田鱼</li>
                    <li>猪肉</li>
                    <li>豆腐</li>
                    <li>花生等</li>
                </ul>
            </div>

            <!-- 3. 市集外购 -->
            <div class="card card-market" onclick="openModal('market')">
                <div class="icon-box">🛒</div>
                <h2>市集外购</h2>
                <ul>
                    <li>盐</li>
                    <li>酒曲</li>
                    <li>少量调味品等</li>
                </ul>
            </div>
        </div>
    </div>

    <!-- 弹窗层 -->
    <div class="modal-overlay" id="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-icon" id="modalIcon">🌲</div>
            <h2 class="modal-title" id="modalTitle">山林采集</h2>
            <p class="modal-desc" id="modalDesc">这里是详细描述...
            <button class="close-btn" onclick="closeModal()">关闭</button>
        </div>
    </div>

    <script>
        const data = {
            mountain: {
                icon: '🌲',
                title: '山林采集',
                desc: '占据绝对主导地位，提供了最丰富的食材种类。这是哈尼族“森林-村寨-梯田-水系”四素同构生态系统的直接体现，代表了人与自然的深度链接。'
            },
            terrace: {
                icon: '🌾',
                title: '梯田自产',
                desc: '提供主食与肉类，保障基础供给。体现了哈尼族人千年来精耕细作的智慧，红米与梯田鱼构成了长街宴的坚实物质基础。'
            },
            market: {
                icon: '🛒',
                title: '市集外购',
                desc: '占比较低，主要作为调味品补充。虽然依赖外部输入，但这些少量的盐、酒曲等却是激发食材本味、完成仪式感的点睛之笔。'
            }
        };

        function openModal(type) {
            const modal = document.getElementById('modal');
            const d = data[type];
            document.getElementById('modalIcon').innerText = d.icon;
            document.getElementById('modalTitle').innerText = d.title;
            document.getElementById('modalDesc').innerText = d.desc;
            modal.classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        // ESC键关闭
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeModal();
            }
        });
    </script>
    <script src="js/embed-child.js"></script>
</body>
</html>
